<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Calendar Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #1e7e34;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #ffc107;
            color: #000;
        }

        .btn-warning:hover {
            background: #e0a800;
            transform: translateY(-2px);
        }

        .search-box {
            flex: 1;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            border-radius: 10px;
            max-height: 80%;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Date Picker Styling */
        .date-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-input-group select {
            flex: 1;
            cursor: pointer;
        }

        .date-preview {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            text-align: center;
        }

        .table-container {
            overflow-x: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #dee2e6;
        }

        th {
            background: #667eea;
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .status-select {
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
        }

        .status-published {
            background: #d4edda;
            color: #155724;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-draft {
            background: #fff3cd;
            color: #856404;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-review {
            background: #d1ecf1;
            color: #0c5460;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        /* Date column styling */
        .date-cell {
            font-weight: bold;
            color: #667eea;
            white-space: nowrap;
        }

        /* Quick date buttons */
        .quick-dates {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .quick-date-btn {
            padding: 5px 10px;
            font-size: 11px;
            background: #e9ecef;
            border: 1px solid #dee2e6;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-date-btn:hover {
            background: #667eea;
            color: white;
        }

        .date-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Content Calendar Manager</h1>
            <p>Manage your content across Main Page, Canada LC Community, and YouTube</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="showAddModal()">+ Add New Entry</button>
            <button class="btn btn-success" onclick="exportExcel()">📥 Export Excel</button>
            <input type="text" class="search-box" placeholder="🔍 Search content..." id="searchInput" onkeyup="searchEntries()">
            <select class="search-box" id="filterStatus" onchange="filterEntries()">
                <option value="">All Statuses</option>
                <option value="FOR PUBLISHING">📢 FOR PUBLISHING</option>
                <option value="POST ENGAGEMENT">💬 POST ENGAGEMENT</option>
                <option value="DRAFT">✏️ DRAFT</option>
                <option value="SCHEDULED">⏰ SCHEDULED</option>
            </select>
            <button class="btn btn-warning" onclick="refreshTable()">🔄 Refresh</button>
        </div>

        <div class="table-container">
            <table id="contentTable">
                <thead>
                    <tr>
                        <th>📅 DATE</th>
                        <th>📄 MAIN PAGE</th>
                        <th>📊 STATUS</th>
                        <th>🇨🇦 CANADA LC COMMUNITY</th>
                        <th>📊 STATUS</th>
                        <th>▶️ YOUTUBE</th>
                        <th>📊 STATUS</th>
                        <th>⚙️ ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Entry</h2>
                <button class="btn btn-danger btn-sm" onclick="closeModal()">×</button>
            </div>
            <form id="entryForm">
                <div class="form-group">
                    <label>📅 Select Date</label>
                    <div class="date-input-group">
                        <select id="day" required style="width: 80px;">
                            <option value="">Day</option>
                        </select>
                        <select id="month" required>
                            <option value="">Month</option>
                            <option value="Jan">January</option>
                            <option value="Feb">February</option>
                            <option value="Mar">March</option>
                            <option value="Apr">April</option>
                            <option value="May">May</option>
                            <option value="Jun">June</option>
                            <option value="Jul">July</option>
                            <option value="Aug">August</option>
                            <option value="Sep">September</option>
                            <option value="Oct">October</option>
                            <option value="Nov">November</option>
                            <option value="Dec">December</option>
                        </select>
                    </div>
                    <div class="quick-dates">
                        <button type="button" class="quick-date-btn" onclick="setDate(15, 'Jun')">15-Jun</button>
                        <button type="button" class="quick-date-btn" onclick="setDate(16, 'Jun')">16-Jun</button>
                        <button type="button" class="quick-date-btn" onclick="setDate(17, 'Jun')">17-Jun</button>
                        <button type="button" class="quick-date-btn" onclick="setDate(18, 'Jun')">18-Jun</button>
                        <button type="button" class="quick-date-btn" onclick="setDate(19, 'Jun')">19-Jun</button>
                        <button type="button" class="quick-date-btn" onclick="setDate(20, 'Jun')">20-Jun</button>
                        <button type="button" class="quick-date-btn" onclick="setToday()">Today</button>
                    </div>
                    <div class="date-preview" id="datePreview">
                        Selected date will appear here
                    </div>
                    <input type="hidden" id="date" required>
                </div>
                <div class="form-group">
                    <label>📄 Main Page Content</label>
                    <input type="text" id="mainPage" required placeholder="e.g., Brazilian Dance, Expo Invite...">
                </div>
                <div class="form-group">
                    <label>📊 Main Page Status</label>
                    <select id="mainStatus">
                        <option value="FOR PUBLISHING">📢 FOR PUBLISHING</option>
                        <option value="POST ENGAGEMENT">💬 POST ENGAGEMENT</option>
                        <option value="DRAFT">✏️ DRAFT</option>
                        <option value="SCHEDULED">⏰ SCHEDULED</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🇨🇦 Canada LC Community Content</label>
                    <input type="text" id="canadaContent" placeholder="e.g., WHERE, Post Engagement...">
                </div>
                <div class="form-group">
                    <label>📊 Canada LC Community Status</label>
                    <select id="canadaStatus">
                        <option value="FOR PUBLISHING">📢 FOR PUBLISHING</option>
                        <option value="POST ENGAGEMENT">💬 POST ENGAGEMENT</option>
                        <option value="DRAFT">✏️ DRAFT</option>
                        <option value="SCHEDULED">⏰ SCHEDULED</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>▶️ YouTube Content</label>
                    <input type="text" id="youtubeContent" placeholder="e.g., Video title...">
                </div>
                <div class="form-group">
                    <label>📊 YouTube Status</label>
                    <select id="youtubeStatus">
                        <option value="FOR PUBLISHING">📢 FOR PUBLISHING</option>
                        <option value="POST ENGAGEMENT">💬 POST ENGAGEMENT</option>
                        <option value="DRAFT">✏️ DRAFT</option>
                        <option value="SCHEDULED">⏰ SCHEDULED</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">💾 Save Entry</button>
            </form>
        </div>
    </div>

    <script>
        let currentEditRow = null;

        // Populate days dropdown
        function populateDays() {
            const daySelect = document.getElementById('day');
            for (let i = 1; i <= 31; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                daySelect.appendChild(option);
            }
        }

        // Set date from quick buttons
        function setDate(day, month) {
            document.getElementById('day').value = day;
            document.getElementById('month').value = month;
            updateDatePreview();
        }

        function setToday() {
            const today = new Date();
            const day = today.getDate();
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const month = months[today.getMonth()];
            setDate(day, month);
        }

        // Update date preview
        function updateDatePreview() {
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const hiddenDate = document.getElementById('date');
            
            if (day && month) {
                const dateString = `${day}-${month}`;
                hiddenDate.value = dateString;
                document.getElementById('datePreview').innerHTML = `📅 Selected: <strong>${dateString}</strong> <span class="date-badge">Ready to save</span>`;
                document.getElementById('datePreview').style.background = '#e8f5e9';
            } else {
                hiddenDate.value = '';
                document.getElementById('datePreview').innerHTML = '⚠️ Please select a date';
                document.getElementById('datePreview').style.background = '#ffebee';
            }
        }

        // Load entries on page load
        document.addEventListener('DOMContentLoaded', () => {
            populateDays();
            loadEntries();
            
            // Add event listeners for date inputs
            document.getElementById('day').addEventListener('change', updateDatePreview);
            document.getElementById('month').addEventListener('change', updateDatePreview);
        });

        async function loadEntries() {
            const response = await fetch('/api/entries');
            const entries = await response.json();
            displayEntries(entries);
        }

        function displayEntries(entries) {
            const tbody = document.getElementById('tableBody');
            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">📭 No entries found</td></tr>';
                return;
            }

            tbody.innerHTML = entries.map(entry => `
                <tr>
                    <td class="date-cell">📅 ${entry.date || ''}</td>
                    <td>${entry.main_page || '—'}</td>
                    <td><span class="status-${getStatusClass(entry.main_status)}">${entry.main_status || '—'}</span></td>
                    <td>${entry.canada_content || '—'}</td>
                    <td><span class="status-${getStatusClass(entry.canada_status)}">${entry.canada_status || '—'}</span></td>
                    <td>${entry.youtube_content || '—'}</td>
                    <td><span class="status-${getStatusClass(entry.youtube_status)}">${entry.youtube_status || '—'}</span></td>
                    <td class="action-buttons">
                        <button class="btn btn-primary btn-sm" onclick="editEntry(${entry.row})">✏️ Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteEntry(${entry.row})">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (!status) return 'draft';
            switch(status.toLowerCase()) {
                case 'for publishing': return 'published';
                case 'post engagement': return 'review';
                default: return 'draft';
            }
        }

        function showAddModal() {
            currentEditRow = null;
            document.getElementById('modalTitle').textContent = '➕ Add New Entry';
            document.getElementById('entryForm').reset();
            document.getElementById('day').value = '';
            document.getElementById('month').value = '';
            document.getElementById('datePreview').innerHTML = 'Selected date will appear here';
            document.getElementById('datePreview').style.background = '#f8f9fa';
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function editEntry(row) {
            currentEditRow = row;
            const response = await fetch('/api/entries');
            const entries = await response.json();
            const entry = entries.find(e => e.row === row);
            
            if (entry && entry.date) {
                // Parse date like "15-Jun"
                const [day, month] = entry.date.split('-');
                document.getElementById('day').value = day;
                document.getElementById('month').value = month;
                updateDatePreview();
                
                document.getElementById('mainPage').value = entry.main_page || '';
                document.getElementById('mainStatus').value = entry.main_status || 'FOR PUBLISHING';
                document.getElementById('canadaContent').value = entry.canada_content || '';
                document.getElementById('canadaStatus').value = entry.canada_status || 'FOR PUBLISHING';
                document.getElementById('youtubeContent').value = entry.youtube_content || '';
                document.getElementById('youtubeStatus').value = entry.youtube_status || 'FOR PUBLISHING';
                document.getElementById('modalTitle').textContent = '✏️ Edit Entry';
                document.getElementById('modal').style.display = 'block';
            }
        }

        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            if (!date) {
                alert('Please select a date!');
                return;
            }
            
            const entry = {
                date: date,
                main_page: document.getElementById('mainPage').value,
                main_status: document.getElementById('mainStatus').value,
                canada_content: document.getElementById('canadaContent').value,
                canada_status: document.getElementById('canadaStatus').value,
                youtube_content: document.getElementById('youtubeContent').value,
                youtube_status: document.getElementById('youtubeStatus').value
            };

            let url = '/api/entries';
            let method = 'POST';

            if (currentEditRow) {
                url = `/api/entries/${currentEditRow}`;
                method = 'PUT';
            }

            const response = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(entry)
            });

            if (response.ok) {
                closeModal();
                loadEntries();
                showNotification('Entry saved successfully!');
            }
        });

        async function deleteEntry(row) {
            if (confirm('⚠️ Are you sure you want to delete this entry?')) {
                const response = await fetch(`/api/entries/${row}`, {method: 'DELETE'});
                if (response.ok) {
                    loadEntries();
                    showNotification('Entry deleted successfully!');
                }
            }
        }

        async function searchEntries() {
            const keyword = document.getElementById('searchInput').value;
            if (keyword.trim() === '') {
                loadEntries();
                return;
            }
            
            const response = await fetch(`/api/search?q=${encodeURIComponent(keyword)}`);
            const results = await response.json();
            displayEntries(results);
        }

        async function filterEntries() {
            const status = document.getElementById('filterStatus').value;
            if (status === '') {
                loadEntries();
                return;
            }
            
            const response = await fetch(`/api/filter?status=${encodeURIComponent(status)}`);
            const results = await response.json();
            displayEntries(results);
        }

        function refreshTable() {
            loadEntries();
            showNotification('Calendar refreshed!');
        }

        function exportExcel() {
            window.location.href = '/api/export';
            showNotification('Excel file downloaded!');
        }

        function showNotification(message) {
            // Simple alert for now - you can replace with a toast notification
            console.log(message);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
